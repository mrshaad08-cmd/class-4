<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag Analysis</title>
    <h1>From Design</h1>
</head>
<body>

    <ul type="Square">
       <li>Shaad</li>
        <li>Shayan</li>
        <li>Shuvo</li>
        <li>Soikot</li>
        <li>Samad</li>
    </ul>
    <form style="width: 400; margin: auto; text-align: left;">

        <label for="fname">First Name : </label>
        <input id="fname" type="First Name" placeholder="First Name"><br><br>

        <label for="lnang">Last Name :</label>
        <input id="lname" type="Last Name" placeholder="Last Name"><br><br>

        <label for="email">Email : </label>
        <input id="email" type="emil" placeholder="Email"><br><br>

        <label for="password">Password:</label>
        <input id="password" type="password" placeholder="Enter password"><br><br>

        <label for="mobile">Mobile : </label>
        <input id="mobile" type="number" placeholder="+8801XXXXXXX"><br><br>

        <label for="date of birth">Date of Birth :</label>
        <input id="date" type="date" placeholder="date"><br><br>

        <label>Marital Status :</label>
        <input id="single" type="radio" name="marital_status" value="single">
        <label for="single">Single</label>
        <input id="married" type="radio" name="marital_status" value="married">
        <label for="married">Married</label><br><br>

        <label for="file">File:</label>
        <input id="file" type="file" placeholder="file"><br><br>

        <label for="skill">Skill:</label>
        <input id="skill" type="checkbox">HTML
        <input id="skill" type="checkbox">CSS
        <input id="skill" type="checkbox">JS <br><br>

        <label for="gender">Gender : </label>
        <input id="gender" type="radio" name="gender" value="Male">Male
        <input id="gender" type="radio" name="gender" value="Female">Female 
        <br><br>

        <label for="search">Search : </label>
        <input type="search" placeholder="search...."><br><br>
        
        <label for="select">Select:</label>
        <select id="select">
            <option value="option1">HTML</option>
            <option value="option2">CSS</option>
            <option value="option3">JS</option></select><br><br>

        <label for="textarea">Text Area : </label><br>
        <textarea id="textarea" cols="80" rows="5" placeholder="Comment"></textarea><br><br>
        
        <label for="time"> Time : </label>
        <input id="time" type="time" placeholder="Time"><br><br>
        
        <label for="date">Date:</label>
        <input id="date" type="date" placeholder="date"><br><br>

        <input type="submit" value="submit">
    </form>
</body>
</html>
